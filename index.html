<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STUDIO24-JOE RODRIGUEZ</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
}

/* TITULO */
h1{
text-align:center;
color:#ff0066;
margin:15px 0;
}

/* HERO */
.hero{
padding:70px 20px;
text-align:center;
background-size:cover;
background-position:center;
transition:1s;
}

/* GALERIA */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:8px;
padding:10px;
}

img{
width:100%;
height:180px;
object-fit:cover;
border-radius:10px;
}

/* CONTACTO ABAJO */
.contacto{
background:#111;
padding:15px;
text-align:center;
border-top:2px solid #25D366;
}

/* BOTON WHATSAPP */
.whatsapp{
background:#25D366;
color:white;
padding:12px;
border-radius:30px;
display:inline-block;
text-decoration:none;
font-weight:bold;
width:90%;
max-width:300px;
}

/* BOTON FLOTANTE */
.float{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
text-decoration:none;
box-shadow:0 5px 15px rgba(0,0,0,0.5);
}
</style>
</head>

<body>

<h1>STUDIO24</h1>

<!-- HERO -->
<div class="hero" id="hero">
<h2>Fotografía Profesional</h2>
<p>Momentos que duran para siempre 📸</p>
</div>

<!-- GALERÍA -->
<div class="grid" id="gallery"></div>

<!-- CONTACTO -->
<div class="contacto">
<a class="whatsapp"
href="https://wa.me/5216481222132?text=Hola%20quiero%20información%20de%20STUDIO24%20📸"
target="_blank">
📲 Contactar por WhatsApp
</a>
<p style="font-size:12px;color:#aaa;margin-top:8px;">
Respuesta rápida • Reservas • Información
</p>
</div>

<!-- BOTÓN FLOTANTE WHATSAPP -->
<a class="float"
href="https://wa.me/5216481222132?text=Hola%20quiero%20reservar%20una%20sesión"
target="_blank">
💬
</a>

<script>

/* IMÁGENES ALEATORIAS */
const images = [
"https://images.unsplash.com/photo-1500530855697-b586d89ba3ee",
"https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e",
"https://images.unsplash.com/photo-1506794778202-cad84cf45f1d",
"https://images.unsplash.com/photo-1516035069371-29a1b244cc32",
"https://images.unsplash.com/photo-1502920917128-1aa500764cbd",
"https://images.unsplash.com/photo-1494790108377-be9c29b29330"
];

/* HERO DINÁMICO */
function changeHero(){
let img = images[Math.floor(Math.random()*images.length)];
document.getElementById("hero").style.backgroundImage = `url(${img})`;
}
setInterval(changeHero,3000);
changeHero();

/* GALERÍA */
function load(){
let g=document.getElementById("gallery");
g.innerHTML="";
for(let i=0;i<12;i++){
let img = images[Math.floor(Math.random()*images.length)];
g.innerHTML += `<img src="${img}">`;
}
}
load();

</script>

</body>
</html>
